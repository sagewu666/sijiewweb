<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sijie Wu | EdTech Portfolio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Light Theme Liquid Glass */
      --bg-gradient: radial-gradient(circle at 50% 0%, #f8fafc 0%, #e0e7ff 100%);
      --glass-bg: rgba(255, 255, 255, 0.5);
      --glass-border: rgba(255, 255, 255, 0.7);
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      --accent-glow: rgba(147, 197, 253, 0.5);
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      margin: 0;
      color: #0f172a;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      letter-spacing: 0.03em;
    }
    #root {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .font-heading {
      font-family: 'Space Grotesk', sans-serif;
    }
    
    /* Reveal and Entry Animations */
    .reveal {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .reveal.active {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .animate-hero-text {
      animation: fadeInDown 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Simple Title Reveal Animation */
    .title-reveal {
      opacity: 0;
      transform: translateY(20px);
      filter: blur(8px);
      transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .reveal.active .title-reveal, .active .title-reveal {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }

    /* Liquid Glassmorphism */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 0 20px rgba(255, 255, 255, 0.02);
      border-radius: 24px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .glass-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 15px 45px 0 rgba(0, 0, 0, 0.4), inset 0 0 30px rgba(255, 255, 255, 0.05);
    }

    /* 3D Hover Effect */
    .hover-3d {
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.6s ease;
      transform-style: preserve-3d;
      perspective: 1000px;
    }
    .hover-3d:hover {
      transform: translateY(-12px) rotateX(4deg) rotateY(-4deg) scale(1.02);
      box-shadow: 25px 25px 50px rgba(0,0,0,0.5), -10px -10px 30px rgba(56, 189, 248, 0.1);
    }

    /* Floating Background Blobs */
    @keyframes float {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(80px, -120px) scale(1.2) rotate(15deg); }
      66% { transform: translate(-60px, 60px) scale(0.8) rotate(-15deg); }
      100% { transform: translate(0, 0) scale(1) rotate(0deg); }
    }
    .animate-float {
      animation: float 25s infinite ease-in-out;
    }
    
    /* Flying Effect */
    @keyframes fly {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-25px) rotate(3deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
    .animate-fly {
      animation: fly 8s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; filter: blur(80px); transform: scale(1); }
      50% { opacity: 0.7; filter: blur(120px); transform: scale(1.2); }
    }
    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(191, 219, 254, 0.6) 0%, rgba(233, 213, 255, 0.4) 100%);
      animation: pulse-glow 15s infinite alternate;
      z-index: -1;
      pointer-events: none;
    }

    /* Interactive Glow Button */
    .btn-glow-interactive {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 9999px;
      color: #1e3a8a;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 32px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.15);
    }
    .btn-glow-interactive::before {
      content: '';
      position: absolute;
      top: var(--y, 50%);
      left: var(--x, 50%);
      transform: translate(-50%, -50%);
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.6) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: -1;
    }
    .btn-glow-interactive:hover::before {
      opacity: 1;
    }
    .btn-glow-interactive:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: rgba(56, 189, 248, 0.5);
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
    }
    .btn-glow-interactive svg {
      transition: transform 0.3s ease;
    }
    .btn-glow-interactive:hover svg {
      transform: translateX(6px);
    }

    /* Nav Link Hover */
    .nav-link-hover {
      position: relative;
    }
    .nav-link-hover::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      width: 0;
      height: 2px;
      background: #38bdf8;
      transition: all 0.3s ease;
      transform: translateX(-50%);
      border-radius: 2px;
      box-shadow: 0 0 8px #38bdf8;
    }
    .nav-link-hover:hover::after, .nav-link-hover.active::after {
      width: 80%;
    }

    /* Intertwining Animation */
    @keyframes intertwineLeft {
      0% { transform: translateX(0) scale(0.5) rotate(-10deg); opacity: 0; }
      30% { transform: translateX(110%) scale(0.8) rotate(10deg); opacity: 1; z-index: 10; }
      70% { transform: translateX(-20%) scale(1.1) rotate(-5deg); z-index: 20; }
      100% { transform: translateX(0) scale(1) rotate(0); z-index: 10; }
    }

    @keyframes intertwineRight {
      0% { transform: translateX(0) scale(0.5) rotate(10deg); opacity: 0; }
      30% { transform: translateX(-110%) scale(1.1) rotate(-10deg); opacity: 1; z-index: 20; }
      70% { transform: translateX(20%) scale(0.8) rotate(5deg); z-index: 10; }
      100% { transform: translateX(0) scale(1) rotate(0); z-index: 10; }
    }

    .reveal.active .project-card-0 {
      animation: intertwineLeft 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    .reveal.active .project-card-1 {
      animation: intertwineRight 2.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
  </style>
